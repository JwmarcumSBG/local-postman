$kind: http-example
name: >
  Response object representing a single team.

  Contains various properties about the team, such as id, title, description,
  type etc.
request:
  url: "{{baseUrl}}/teams/:id"
  method: PUT
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    id: ""
  body:
    type: json
    content: |-
      {
        "title": "<string>",
        "description": "<string>"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "<string>",
        "type": "order",
        "title": "<string>",
        "description": "<string>",
        "mdfId": "<string>",
        "metadata": {
          "nostruda1": 46031101
        },
        "createdAt": "<dateTime>",
        "createdById": "<string>",
        "updatedAt": "<dateTime>",
        "updatedById": "<string>",
        "version": "<integer>"
      }
order: 1000
