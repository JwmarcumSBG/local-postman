$kind: http-request
description: Returns a list of all teams. Pagination will apply for large datasets.
url: "{{baseUrl}}/teams?limit=<integer>&orderBy=createdAt&sortOrder=asc&key=<st\
  ring>"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: limit
    value: <integer>
    description: Max number of teams to retrieve. Default 25
  - key: orderBy
    value: createdAt
    description: Sort criteria. Either createdAt or updatedAt. Default is createdAt
  - key: sortOrder
    value: asc
    description: Sort order. Either asc or desc. Default is desc
  - key: key
    value: <string>
    description: Pagination key
examples: ./.resources/Get teams.resources/examples
order: 2000
