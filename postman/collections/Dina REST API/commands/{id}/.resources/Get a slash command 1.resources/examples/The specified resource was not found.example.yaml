$kind: http-example
request:
  url: "{{baseUrl}}/commands/:id"
  method: PATCH
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    id: ""
  body:
    type: json
    content: |-
      {
        "title": "<string>",
        "command": "<string>",
        "active": "<boolean>",
        "color": "<string>",
        "singleOnly": "<boolean>"
      }
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "code": "<string>",
        "message": "<string>"
      }
order: 3000
