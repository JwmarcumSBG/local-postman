$kind: http-request
description: get provider details of a given member id and provider name
url: "{{baseUrl}}/providers/:providerName/member/:id?nextToken=<string>&limit=<\
  string>"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: nextToken
    value: <string>
    description: url encoded string fetched from previous response
  - key: limit
    value: <string>
    description: number of related members to return at most
pathVariables:
  - key: providerName
    value: <string>
    description: "(Required) "
  - key: id
    value: <uuid>
    description: "(Required) "
examples: ./.resources/get provider details.resources/examples
order: 1000
