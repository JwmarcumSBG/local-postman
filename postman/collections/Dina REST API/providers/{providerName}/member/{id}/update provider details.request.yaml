$kind: http-request
description: update provider details of a given member id and provider name
url: "{{baseUrl}}/providers/:providerName/member/:id"
method: PUT
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: providerName
    value: <string>
    description: "(Required) "
  - key: id
    value: <uuid>
    description: "(Required) "
body:
  type: json
  content: |-
    {
      "providerDetails": {
        "id": "<string>",
        "resourceUrl": "<string>",
        "resourcePermit": "<boolean>"
      },
      "notificationPreferences": {
        "sita_": "<boolean>",
        "labore_91": "<boolean>",
        "reprehenderitc_2": "<boolean>"
      }
    }
examples: ./.resources/update provider details.resources/examples
order: 2000
