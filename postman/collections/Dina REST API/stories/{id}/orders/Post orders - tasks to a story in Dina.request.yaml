$kind: http-request
name: Post orders / tasks to a story in Dina
description: Create new tasks / orders as part of a story in Dina
url: "{{baseUrl}}/stories/:id/orders"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: <uuid>
    description: (Required) Story id
body:
  type: json
  content: |-
    {
      "mFormId": "<string>",
      "mResourceId": "<string>",
      "mResourceType": "<string>",
      "mStatus": "<string>",
      "mOwner": "<string>",
      "mAssignee": "<string>",
      "metadata": {}
    }
examples: ./.resources/Post orders - tasks to a story in Dina.resources/examples
order: 2000
