$kind: http-request
description: Get orders for this story
url: "{{baseUrl}}/stories/:id/orders?limit=<integer>&key=<string>&sortOrder=asc\
  &status=<string>"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: limit
    value: <integer>
    description: Max number of orders to retrieve.
  - key: key
    value: <string>
    description: Pagination key
  - key: sortOrder
    value: asc
    description: Sort order. Either asc or desc
  - key: status
    value: <string>
pathVariables:
  - key: id
    value: <uuid>
    description: (Required) Story id
examples: ./.resources/Get orders for this story.resources/examples
order: 3000
