$kind: http-request
description: Delete an order
url: "{{baseUrl}}/stories/:id/orders/:orderId"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: <uuid>
    description: (Required) Story id
  - key: orderId
    value: <uuid>
    description: (Required) Order id
examples: ./.resources/Delete an order.resources/examples
order: 2000
