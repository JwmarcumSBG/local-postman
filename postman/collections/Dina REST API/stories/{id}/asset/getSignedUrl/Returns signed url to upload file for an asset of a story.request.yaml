$kind: http-request
url: "{{baseUrl}}/stories/:id/asset/getSignedUrl"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: <uuid>
    description: (Required) Story id
body:
  type: json
  content: |-
    {
      "placeholderId": "<string>",
      "filename": "<string>",
      "mimeType": "<string>"
    }
examples: ./.resources/Returns signed url to upload file for an asset of a
  story.resources/examples
order: 1000
