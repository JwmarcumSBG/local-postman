$kind: http-request
description: Deletes an message from the chat.
url: "{{baseUrl}}/stories/:id/chat/:messageId"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: <uuid>
    description: (Required) Story id
  - key: messageId
    value: <uuid>
    description: (Required) message id
examples: ./.resources/Deletes a message.resources/examples
order: 2000
