$kind: http-request
description: Partially update an order
url: "{{baseUrl}}/rundowns/:id/orders/:orderId"
method: PATCH
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: <uuid>
    description: (Required) Rundown id
  - key: orderId
    value: <uuid>
    description: (Required) Order id
body:
  type: json
  content: |-
    {
      "mStatus": "<string>",
      "mOwner": "<string>",
      "mAssignee": "<string>",
      "metadata": {}
    }
examples: ./.resources/Partially update an order.resources/examples
order: 1000
