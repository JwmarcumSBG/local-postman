$kind: http-request
description: Create an asset for this rundown
url: "{{baseUrl}}/rundowns/:id/assets"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: <uuid>
    description: (Required) Rundown id
body:
  type: json
  content: |-
    {
      "title": "<string>",
      "itemType": "<string>",
      "externalId": "<string>"
    }
examples: ./.resources/Create an asset for this rundown.resources/examples
order: 2000
