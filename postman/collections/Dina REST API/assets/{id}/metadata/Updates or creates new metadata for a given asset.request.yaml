$kind: http-request
url: "{{baseUrl}}/assets/:id/metadata"
method: PUT
headers:
  Content-Type: application/json
pathVariables:
  - key: id
    value: <uuid>
    description: (Required) Asset id (mRefId)
body:
  type: json
  content: "{}"
examples: ./.resources/Updates or creates new metadata for a given
  asset.resources/examples
order: 2000
