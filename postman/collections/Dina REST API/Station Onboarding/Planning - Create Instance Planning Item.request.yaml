$kind: http-request
url: "{{baseUrl}}/instances/{{saga_instance_id}}/planningItems"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: text
  content: "{{saga_planning_item_create_body}}"
scripts:
  - type: afterResponse
    code: pm.test('Status is 2xx', function () {
      pm.expect(pm.response.code).to.be.within(200, 299); });
    language: text/javascript
order: 8000
