$kind: http-request
url: "{{baseUrl}}/mdfs"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: text
  content: "{{saga_mdf_create_body}}"
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 2xx', function () {
      pm.expect(pm.response.code).to.be.within(200, 299); });

      try { const body = pm.response.json(); if (body && body.id) {
      pm.collectionVariables.set('saga_mdf_id', body.id); } } catch (e) {}
    language: text/javascript
order: 4000
