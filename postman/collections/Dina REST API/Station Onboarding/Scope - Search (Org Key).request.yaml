$kind: http-request
url: "{{baseUrl}}/search"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: text
  content: "{{saga_search_body}}"
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status 200', function () { pm.response.to.have.status(200); });

      try { const body = pm.response.json(); const c =
      Array.isArray(body.stories) ? body.stories.length :
      (Array.isArray(body.items) ? body.items.length : 0);
      pm.collectionVariables.set('saga_last_search_count', String(c)); } catch
      (e) {}
    language: text/javascript
order: 1000
