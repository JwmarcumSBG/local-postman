$kind: http-request
description: Create a order inside a planning item
url: "{{baseUrl}}/planningItems/:id/orders"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: <uuid>
    description: (Required) Planning item id
body:
  type: json
  content: |-
    {
      "mFormId": "<string>",
      "mResourceId": "<string>",
      "mResourceType": "<string>",
      "mStatus": "<string>",
      "mOwner": "<string>",
      "mAssignee": "<string>",
      "metadata": {}
    }
examples: ./.resources/create a order inside a planning item.resources/examples
order: 2000
