$kind: http-request
description: Retrieve a single order form for a given space
url: "{{baseUrl}}/spaces/:id/orderforms/:formId"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: <string>
    description: (Required) The space identifier
  - key: formId
    value: <uuid>
    description: (Required) The order form identifier
examples: ./.resources/Retrieve a single order form for a given space.resources/examples
order: 1000
