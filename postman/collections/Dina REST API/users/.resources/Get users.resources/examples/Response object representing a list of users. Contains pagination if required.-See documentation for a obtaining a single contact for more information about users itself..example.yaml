$kind: http-example
name: >
  Response object representing a list of users. Contains pagination if required.

  See documentation for a obtaining a single contact for more information about
  users itself.
request:
  url: "{{baseUrl}}/users?limit=<integer>&orderBy=createdAt&sortOrder=asc&key=<st\
    ring>"
  method: GET
  headers:
    Accept: application/json
  queryParams:
    - key: limit
      value: <integer>
      description: Max number of users to retrieve. Default 25
    - key: orderBy
      value: createdAt
      description: Sort criteria. Either createdAt or updatedAt. Default is createdAt
    - key: sortOrder
      value: asc
      description: Sort order. Either asc or desc. Default is desc
    - key: key
      value: <string>
      description: Pagination key
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
