$kind: http-request
description: Returns a list of all users. Pagination will apply for large datasets.
url: "{{baseUrl}}/users?limit=<integer>&orderBy=createdAt&sortOrder=asc&key=<st\
  ring>"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: limit
    value: <integer>
    description: Max number of users to retrieve. Default 25
  - key: orderBy
    value: createdAt
    description: Sort criteria. Either createdAt or updatedAt. Default is createdAt
  - key: sortOrder
    value: asc
    description: Sort order. Either asc or desc. Default is desc
  - key: key
    value: <string>
    description: Pagination key
examples: ./.resources/Get users.resources/examples
order: 2000
