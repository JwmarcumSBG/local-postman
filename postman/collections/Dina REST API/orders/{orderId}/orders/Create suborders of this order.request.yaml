$kind: http-request
description: Create suborders of this order
url: "{{baseUrl}}/orders/:orderId/orders"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: orderId
    value: <uuid>
    description: (Required) order id
body:
  type: json
  content: |-
    {
      "mFormId": "<string>",
      "mResourceId": "<string>",
      "mResourceType": "<string>",
      "mStatus": "<string>",
      "mOwner": "<string>",
      "mAssignee": "<string>",
      "metadata": {}
    }
examples: ./.resources/Create suborders of this order.resources/examples
order: 3000
