$kind: http-request
description: Partially update an order
url: "{{baseUrl}}/orders/:orderId/orders/:suborderId"
method: PATCH
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: orderId
    value: <uuid>
    description: (Required) order id
  - key: suborderId
    value: <uuid>
    description: (Required) suborder id
body:
  type: json
  content: |-
    {
      "mStatus": "<string>",
      "mOwner": "<string>",
      "mAssignee": "<string>",
      "metadata": {}
    }
examples: ./.resources/Partially update an order.resources/examples
order: 1000
