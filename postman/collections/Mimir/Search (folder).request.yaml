$kind: http-request
url: "{{base_url}}/search?searchString=*&itemsPerPage=100&from=0&includeSubfold\
  ers=true"
method: GET
headers:
  Accept: application/json
  x-mimir-cognito-id-token: Bearer {{api_key}}
queryParams:
  - key: searchString
    value: "*"
  - key: itemsPerPage
    value: "100"
  - key: from
    value: "0"
  - key: includeSubfolders
    value: "true"
  - key: folderId
    value: <folder-guid>
    disabled: true
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
    language: text/javascript
order: 3000
