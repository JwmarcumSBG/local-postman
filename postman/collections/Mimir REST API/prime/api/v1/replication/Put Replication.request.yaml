$kind: http-request
description: |
  Put the configuration controlling automated replication of content from other
  Mimir systems, replacing any existing configuration.
url: "{{baseUrl}}/prime/api/v1/replication"
method: PUT
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "sources": [
        {
          "stage": "apac",
          "after": "<dateTime>",
          "externallyReplicatedStorages": [
            {
              "source": "<string>",
              "target": "<string>"
            },
            {
              "source": "<string>",
              "target": "<string>"
            }
          ],
          "secretMimirApiToken": "<string>",
          "shardCount": "<integer>"
        },
        {
          "stage": "prod",
          "after": "<dateTime>",
          "externallyReplicatedStorages": [
            {
              "source": "<string>",
              "target": "<string>"
            },
            {
              "source": "<string>",
              "target": "<string>"
            }
          ],
          "secretMimirApiToken": "<string>",
          "shardCount": "<integer>"
        }
      ]
    }
examples: ./.resources/Put Replication.resources/examples
order: 2000
