$kind: http-example
request:
  url: "{{baseUrl}}/prime/api/v1/live/series/:id/items"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    id: ""
  body:
    type: json
    content: |-
      {
        "scheduledStartTimeMs": "<number>",
        "overrides": {
          "startTimeMs": "<number>",
          "durationMs": "<number>",
          "ingestFrom": {},
          "metadata": {}
        }
      }
response:
  statusCode: 409
  statusText: Conflict
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "statusCode": "<integer>",
        "message": "<string>",
        "developerMessage": "<string>"
      }
order: 3000
