$kind: http-example
request:
  url: "{{baseUrl}}/prime/api/v1/live/series/:id"
  method: PUT
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    id: ""
  body:
    type: json
    content: |-
      {
        "recurrenceSchedule": {},
        "metadataTemplate": {},
        "activeFrom": "<string>",
        "activeTo": "<string>",
        "recordingParams": {
          "durationMs": "<number>",
          "ingestFrom": {},
          "outputSettings": {}
        }
      }
response:
  statusCode: 409
  statusText: Conflict
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "statusCode": "<integer>",
        "message": "<string>",
        "developerMessage": "<string>"
      }
order: 3000
