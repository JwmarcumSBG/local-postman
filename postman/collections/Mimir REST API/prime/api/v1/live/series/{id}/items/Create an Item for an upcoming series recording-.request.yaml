$kind: http-request
name: Create an Item for an upcoming series recording.
description: The created recording item may then be edited independently of the series.
url: "{{baseUrl}}/prime/api/v1/live/series/:id/items"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  id: ""
body:
  type: json
  content: |-
    {
      "scheduledStartTimeMs": "<number>",
      "overrides": {
        "startTimeMs": "<number>",
        "durationMs": "<number>",
        "ingestFrom": {},
        "metadata": {}
      }
    }
examples: ./.resources/Create an Item for an upcoming series recording-.resources/examples
order: 1000
