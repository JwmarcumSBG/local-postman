$kind: http-request
name: Get storage transfers.
description: Get current storage transfers based on different parameters
url: "{{baseUrl}}/prime/api/v1/transfers?dstStorageId=<string>&dstPath=<string>"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: dstStorageId
    value: <string>
    description: The unique ID of the destination storage. Get a specific transfer request by specifying the destination storage ID and path
  - key: dstPath
    value: <string>
    description: The destination path of the transfer. Can be derived from the API response when the transfer was created. The parameter 'dstStorage' is required alongside 'dstPath'
examples: ./.resources/Get storage transfers-.resources/examples
order: 1000
