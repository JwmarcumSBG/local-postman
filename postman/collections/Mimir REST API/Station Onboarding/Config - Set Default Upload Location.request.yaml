$kind: http-request
url: "{{mimirBaseUrl}}/config/api/v1/config/defaultUploadLocation"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "id": "{{mimir_upload_location_id}}"
    }
scripts:
  - type: afterResponse
    code: pm.test('Status is 2xx', function () { pm.expect(pm.response.code).to.be.within(200, 299); });
    language: text/javascript
order: 8000
