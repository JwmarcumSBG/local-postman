$kind: http-example
name: Not authenticated.
request:
  url: "{{baseUrl}}/auxiliary/api/v1/storages/:bucketName/items/:objectKey"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    bucketName: ""
    objectKey: ""
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "statusCode": "<integer>",
        "message": "<string>",
        "developerMessage": "<string>"
      }
order: 3000
