$kind: http-example
name: The user does not have permission to execute this action or the action is not allowed.
request:
  url: "{{baseUrl}}/api/v1/persons/{{personId}}?itemsPerPage=<number>&from=<number>&searchString=<string>&rangeStart=<number>&timeZone=<string>&isFuzzy=<boolean>&folderId=<string>"
  method: GET
  headers:
    Accept: application/json
  queryParams:
    - key: itemsPerPage
      value: <number>
      description: (Required) Number of items should be returned per page.
    - key: from
      value: <number>
      description: (Required) Start number of the page
    - key: searchString
      value: <string>
      description: (Required) Actual Search String.
    - key: rangeStart
      value: <number>
      description: A number that determines if the start number of the page
    - key: timeZone
      value: <string>
      description: time zone of the client
    - key: isFuzzy
      value: <boolean>
      description: A boolean that indicates if the search should run as fuzzy or not.
    - key: folderId
      value: <string>
      description: The id of the folder in which the search should perform.
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "statusCode": "<integer>",
        "message": "<string>",
        "developerMessage": "<string>"
      }
order: 3000
