$kind: http-example
name: Person information was updated successfully.
request:
  url: "{{baseUrl}}/api/v1/persons/:personId"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    personId: ""
  body:
    type: json
    content: |-
      {
        "name": "<string>",
        "description": "<string>",
        "primaryImageId": "<string>"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "name": "<string>",
        "id": "<string>",
        "description": "<string>",
        "primaryImageId": "<string>",
        "imageIds": "<array>",
        "itemType": "<string>",
        "createdOn": "<dateTime>"
      }
order: 1000
