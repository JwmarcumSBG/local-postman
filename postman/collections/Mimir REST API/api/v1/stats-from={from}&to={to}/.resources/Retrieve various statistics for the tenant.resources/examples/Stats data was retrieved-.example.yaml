$kind: http-example
name: Stats data was retrieved.
request:
  url: "{{baseUrl}}/api/v1/stats?from=<string>&to=<string>"
  method: GET
  headers:
    Accept: application/json
  queryParams:
    - key: from
      value: <string>
      description: From date, inclusive. In yyyy-mm-dd format. If not provided then no lower bound is used.
    - key: to
      value: <string>
      description: To date, inclusive. In yyyy-mm-dd format. Defaults to the current date, and should only be provided if "from" is also specified
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "dateRange": {},
        "counts": {
          "sum": "<number>",
          "maxHourly": {
            "value": "<number>",
            "hour": "<string>"
          }
        }
      }
order: 1000
