$kind: http-example
name: Transfer request was created for the particular storage.
request:
  url: "{{baseUrl}}/api/v1/storages/:storageId/transferRequests"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    storageId: ""
  body:
    type: json
    content: |-
      {
        "itemId": "<string>",
        "artefact": "highres",
        "targetFileName": "<string>",
        "createLinkForTargetFileName": "<boolean>"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "itemId": "<string>",
        "artefact": "highres",
        "targetFileName": "<string>",
        "createLinkForTargetFileName": "<boolean>"
      }
order: 1000
