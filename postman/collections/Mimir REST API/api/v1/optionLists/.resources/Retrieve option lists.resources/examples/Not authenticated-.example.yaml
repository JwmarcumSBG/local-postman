$kind: http-example
name: Not authenticated.
request:
  url: "{{baseUrl}}/api/v1/optionLists?idsOnly=<boolean>"
  method: GET
  headers:
    Accept: application/json
  queryParams:
    - key: idsOnly
      value: <boolean>
      description: If true, only ids of the option lists are returned in response
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "statusCode": "<integer>",
        "message": "<string>",
        "developerMessage": "<string>"
      }
order: 2000
