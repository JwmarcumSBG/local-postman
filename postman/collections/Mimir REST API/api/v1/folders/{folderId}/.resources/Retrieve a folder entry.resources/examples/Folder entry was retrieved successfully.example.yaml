$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/folders/:folderId"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    folderId: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "<string>",
        "name": "<string>",
        "owner": "<string>",
        "createdOn": "<dateTime>",
        "hasSubfolder": "<boolean>",
        "kind": "archive-root",
        "metadata": {
          "formId": "<string>",
          "formData": {}
        }
      }
order: 1000
