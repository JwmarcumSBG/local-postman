$kind: http-example
name: Not authenticated.
request:
  url: "{{baseUrl}}/api/v1/folders/:folderId/content"
  method: PUT
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    folderId: ""
  body:
    type: json
    content: |-
      {
        "id": "<string>"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "statusCode": "<integer>",
        "message": "<string>",
        "developerMessage": "<string>"
      }
order: 2000
