$kind: http-request
url: "{{baseUrl}}/api/v1/folders/:folderId?noRecursiveUpdate=<boolean>&implicitVisibilityUpdate=<boolean>"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: noRecursiveUpdate
    value: <boolean>
    description: If true, when updating visibility of a folder, its nested contents will not be updated. By default false if not given.
  - key: implicitVisibilityUpdate
    value: <boolean>
    description: If false, when updating parent of a folder i.e., moving a folder, the folder and its nested contents will not inherit the visibility of the destination folder. By default true if not given.
pathVariables:
  - key: folderId
    value: <string>
    description: (Required) The folder ID
body:
  type: json
  content: |-
    {
      "name": "<string>",
      "parentId": "<string>",
      "visibleTo": {
        "level": "<string>",
        "groups": [
          "<string>",
          "<string>"
        ]
      },
      "updatableBy": {
        "level": "<string>",
        "groups": [
          "<string>",
          "<string>"
        ]
      }
    }
examples: ./.resources/Rename or move or update access-controls of a folder.resources/examples
order: 3000
