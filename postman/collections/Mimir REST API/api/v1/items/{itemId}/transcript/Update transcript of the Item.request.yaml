$kind: http-request
description: |
  Update the transcript of the item
url: "{{baseUrl}}/api/v1/items/:itemId/transcript"
method: PUT
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: itemId
    value: ""
  - key: id
    value: <string>
    description: (Required) The resource identifier string.
body:
  type: json
  content: |-
    {
      "timedTranscript": [
        {
          "content": "<string>",
          "startTime": "<number>",
          "endTime": "<number>"
        }
      ],
      "languageCode": "<string>",
      "isTranslation": "<boolean>",
      "translationTargetLanguage": "<string>"
    }
examples: ./.resources/Update transcript of the Item.resources/examples
order: 1000
