$kind: http-example
name: Not authenticated.
request:
  url: "{{baseUrl}}/api/v1/items/:itemId/upload"
  method: PUT
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    itemId: ""
  body:
    type: json
    content: |-
      {
        "lockOwnerInstanceId": "<string>",
        "uploadLocationId": "<string>",
        "fileName": "<string>",
        "isMultiPartUpload": "<boolean>",
        "fileSize": "<number>",
        "contentType": "<string>",
        "chunkSize": "<number>"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "statusCode": "<integer>",
        "message": "<string>",
        "developerMessage": "<string>"
      }
order: 3000
