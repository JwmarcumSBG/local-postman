$kind: http-request
description: |
  Retrieves the upload lock information for an item.

  The lambda will provide caller with basic information
  about the upload and also define if the upload is currently locked.
url: "{{baseUrl}}/api/v1/items/:itemId/upload"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: itemId
    value: <string>
    description: (Required) The ID of the item to get upload info for
examples: ./.resources/Get upload lock information for an item.resources/examples
order: 1000
