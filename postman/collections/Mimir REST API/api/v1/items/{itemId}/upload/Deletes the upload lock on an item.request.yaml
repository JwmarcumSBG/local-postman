$kind: http-request
description: |
  Deletes the upload lock for an item by resetting the uploadRequestedAt field on the item.
url: "{{baseUrl}}/api/v1/items/:itemId/upload"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: itemId
    value: <string>
    description: (Required) The ID of the item to remove upload lock on
examples: ./.resources/Deletes the upload lock on an item.resources/examples
order: 3000
