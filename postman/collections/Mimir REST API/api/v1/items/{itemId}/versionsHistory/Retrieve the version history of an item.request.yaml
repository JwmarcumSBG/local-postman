$kind: http-request
description: |
  Retrieve the version history of an item as an object with 'versions' property which is an array in descending order from latest to oldest versions of the item
url: "{{baseUrl}}/api/v1/items/:itemId/versionsHistory?fetchItemProperties=<boolean>"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: fetchItemProperties
    value: <boolean>
    description: If true, versions with extra item properties will be provided
pathVariables:
  - key: itemId
    value: <string>
    description: (Required) The ID of the item
examples: ./.resources/Retrieve the version history of an item.resources/examples
order: 1000
