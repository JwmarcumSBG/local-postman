$kind: http-request
description: |
  Updates the name of a version of an item.
url: "{{baseUrl}}/api/v1/items/:itemId/versionsHistory"
method: PUT
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: itemId
    value: <string>
    description: (Required) The ID of the item
body:
  type: json
  content: |-
    {
      "name": "<string>"
    }
examples: ./.resources/Update version name.resources/examples
order: 3000
