$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/items/:itemId/versionsHistory?fetchItemProperties=<boolean>"
  method: GET
  headers:
    Accept: application/json
  queryParams:
    - key: fetchItemProperties
      value: <boolean>
      description: If true, versions with extra item properties will be provided
  pathVariables:
    itemId: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "versions": [
          {
            "id": "<string>",
            "versionCreatedOn": "<string>",
            "versionState": "EXISTS"
          }
        ]
      }
order: 1000
