$kind: http-request
description: |
  Creates a new version of the item with the old item's metadata. The old item
  is hidden.
url: "{{baseUrl}}/api/v1/items/:itemId/version"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: itemId
    value: <string>
    description: (Required) The ID of the item
body:
  type: json
  content: |-
    {
      "withArchiveLinked": "<boolean>",
      "copyMediaToNewVersion": "editProxy",
      "metadata": {
        "formId": "<string>",
        "formData": {}
      },
      "name": "<string>"
    }
examples: ./.resources/Create a new version of item.resources/examples
order: 2000
