$kind: http-example
name: The user does not have permission to execute this action or the action is not allowed.
request:
  url: "{{baseUrl}}/api/v1/items/:itemId/version"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    itemId: ""
  body:
    type: json
    content: |-
      {
        "withArchiveLinked": "<boolean>",
        "copyMediaToNewVersion": "editProxy",
        "metadata": {
          "formId": "<string>",
          "formData": {}
        },
        "name": "<string>"
      }
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "statusCode": "<integer>",
        "message": "<string>",
        "developerMessage": "<string>"
      }
order: 4000
