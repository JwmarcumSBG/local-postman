$kind: http-example
name: Not authenticated.
request:
  url: "{{baseUrl}}/api/v1/items/:itemId/mediaSegments/:stereamIds/:signedForMethod/:firstSegmentIndex"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    itemId: ""
    stereamIds: ""
    signedForMethod: ""
    firstSegmentIndex: ""
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "statusCode": "<integer>",
        "message": "<string>",
        "developerMessage": "<string>"
      }
order: 3000
