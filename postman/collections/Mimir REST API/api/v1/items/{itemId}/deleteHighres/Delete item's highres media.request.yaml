$kind: http-request
description: |
  Initiate deletion of highres media (single flat file or segment files if the item is a live recording) of an item.
url: "{{baseUrl}}/api/v1/items/:itemId/deleteHighres"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: itemId
    value: <string>
    description: (Required) The ID of the item
body:
  type: json
  content: |-
    {
      "deletionDate": "<string>"
    }
examples: ./.resources/Delete item's highres media.resources/examples
order: 1000
