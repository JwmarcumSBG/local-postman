$kind: http-example
name: The user does not have permission to execute this action or the action is not allowed.
request:
  url: "{{baseUrl}}/api/v1/items/:itemId/uploadSign?datetime=<string>&to_sign=<string>"
  method: POST
  headers:
    Accept: application/json
  queryParams:
    - key: datetime
      value: <string>
      description: (Required) Timestamp of the signing request
    - key: to_sign
      value: <string>
      description: (Required) The string to sign
  pathVariables:
    itemId: ""
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "statusCode": "<integer>",
        "message": "<string>",
        "developerMessage": "<string>"
      }
order: 4000
