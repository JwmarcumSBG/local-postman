$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/items/:itemId/mediaUsage"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    itemId: ""
  body:
    type: json
    content: |-
      {
        "lastUsedWorkflow": "import"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "itemId": "<string>",
        "mediaUsage": {
          "lastUsedOn": "<string>",
          "lastUsedWorkflow": "<string>"
        }
      }
order: 1000
