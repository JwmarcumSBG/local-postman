$kind: http-example
name: Not authenticated.
request:
  url: "{{baseUrl}}/api/v1/items/:itemId/timedMetadata?readableMetadataFields=<boolean>"
  method: GET
  headers:
    Accept: application/json
  queryParams:
    - key: readableMetadataFields
      value: <boolean>
      description: If true, the <b>metadata</b> fields' internal GUID will be replaced with readable field IDs
  pathVariables:
    itemId: ""
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "statusCode": "<integer>",
        "message": "<string>",
        "developerMessage": "<string>"
      }
order: 2000
