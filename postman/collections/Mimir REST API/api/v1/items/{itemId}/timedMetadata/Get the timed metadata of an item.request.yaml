$kind: http-request
description: Get the timed metadata collection associated to the given item
url: "{{baseUrl}}/api/v1/items/:itemId/timedMetadata?readableMetadataFields=<boolean>"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: readableMetadataFields
    value: <boolean>
    description: If true, the <b>metadata</b> fields' internal GUID will be replaced with readable field IDs
pathVariables:
  - key: itemId
    value: <string>
    description: (Required) The ID of the item to update.
examples: ./.resources/Get the timed metadata of an item.resources/examples
order: 1000
