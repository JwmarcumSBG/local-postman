$kind: http-request
name: Create an attachment to a specific item.
description: This API is used to create an attachment for a specific item. It will return a signed URL to upload the associated file by using an HTTP PUT request.
url: "{{baseUrl}}/api/v1/items/:itemId/attachments?isPrecheck=<boolean>"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: isPrecheck
    value: <boolean>
    description: If set to true, performs a check on whether a given filename already exists and returns a list of already existing files
pathVariables:
  - key: itemId
    value: <string>
    description: (Required) Unique ID of the item this attachment should be created for
body:
  type: json
  content: |-
    {
      "fileName": "<string>",
      "type": "image",
      "role": "poster",
      "language": "<string>",
      "description": "<string>"
    }
examples: ./.resources/Create an attachment to a specific item-.resources/examples
order: 2000
