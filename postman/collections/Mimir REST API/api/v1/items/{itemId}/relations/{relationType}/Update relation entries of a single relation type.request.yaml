$kind: http-request
url: "{{baseUrl}}/api/v1/items/:itemId/relations/:relationType?readableMetadataFields=<boolean>"
method: PUT
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: readableMetadataFields
    value: <boolean>
    description: If true, the <b>metadata</b> fields' internal GUID will be replaced with readable field IDs
pathVariables:
  - key: itemId
    value: <string>
    description: (Required) The ID of the item
  - key: relationType
    value: parents
    description: (Required) The type of the relation
body:
  type: json
  content: |-
    [
      "<string>",
      "<string>"
    ]
examples: ./.resources/Update relation entries of a single relation type.resources/examples
order: 2000
