$kind: http-example
name: The user does not have permission to execute this action or the action is not allowed.
request:
  url: "{{baseUrl}}/api/v1/items/:itemId/relations/:relationType?readableMetadataFields=<boolean>"
  method: PUT
  headers:
    Content-Type: application/json
    Accept: application/json
  queryParams:
    - key: readableMetadataFields
      value: <boolean>
      description: If true, the <b>metadata</b> fields' internal GUID will be replaced with readable field IDs
  pathVariables:
    itemId: ""
    relationType: ""
  body:
    type: json
    content: |-
      [
        "<string>",
        "<string>"
      ]
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "statusCode": "<integer>",
        "message": "<string>",
        "developerMessage": "<string>"
      }
order: 3000
