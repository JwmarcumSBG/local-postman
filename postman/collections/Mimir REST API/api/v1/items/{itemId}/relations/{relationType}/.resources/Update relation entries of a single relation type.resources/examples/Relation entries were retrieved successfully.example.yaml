$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/items/:itemId/relations/:relationType?readableMetadataFields=<boolean>"
  method: PUT
  headers:
    Content-Type: application/json
    Accept: application/json
  queryParams:
    - key: readableMetadataFields
      value: <boolean>
      description: If true, the <b>metadata</b> fields' internal GUID will be replaced with readable field IDs
  pathVariables:
    itemId: ""
    relationType: ""
  body:
    type: json
    content: |-
      [
        "<string>",
        "<string>"
      ]
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      [
        {
          "type": "archive",
          "item": {
            "id": "<string>",
            "itemState": "progressing",
            "itemType": "audio",
            "mediaDuration": "<number>",
            "metadata": {
              "formData": {
                "default_title": "<string>"
              }
            }
          }
        },
        {
          "type": "archive",
          "item": {
            "id": "<string>",
            "itemState": "error",
            "itemType": "file",
            "mediaDuration": "<number>",
            "metadata": {
              "formData": {
                "default_title": "<string>"
              }
            }
          }
        }
      ]
order: 1000
