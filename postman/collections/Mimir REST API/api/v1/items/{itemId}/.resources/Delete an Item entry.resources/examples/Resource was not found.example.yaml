$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/items/:itemId?immediate=<string>&promoteNewVersion=<string>"
  method: DELETE
  headers:
    Accept: application/json
  queryParams:
    - key: immediate
      value: <string>
      description: |
        If true, indicates that the item should be deleted immediately. Otherwise,
        the item is sent to the recycle bin where it will stay until purge or restoration.
        Note that it is not permitted to delete permanently an item if there are virtual
        clips that have been created from it.
    - key: promoteNewVersion
      value: <string>
      description: |
        If true, indicates that if the item has version history and item is the current leading version then
        the item will be deleted and newest version will be promoted as new leading version.
  pathVariables:
    itemId: ""
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "statusCode": "<integer>",
        "message": "<string>",
        "developerMessage": "<string>"
      }
order: 4000
