$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/items/:itemId/archive"
  method: PUT
  headers:
    Content-Type: application/json
    Accept: application/json
  pathVariables:
    itemId: ""
  body:
    type: json
    content: |-
      {
        "type": "unarchive",
        "archivePath": "<string>"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "type": "unarchive",
        "payload": {
          "folderId": "<string>",
          "folderName": "<string>"
        }
      }
order: 1000
