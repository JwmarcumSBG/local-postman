$kind: http-request
url: "{{baseUrl}}/config/api/v1/bookmarks"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "path": "<string>",
      "title": "<string>",
      "icon": "<string>",
      "isFilterBookmark": "<boolean>",
      "visibleToGroups": [
        "<string>",
        "<string>"
      ]
    }
examples: ./.resources/Create a new system bookmark.resources/examples
order: 3000
