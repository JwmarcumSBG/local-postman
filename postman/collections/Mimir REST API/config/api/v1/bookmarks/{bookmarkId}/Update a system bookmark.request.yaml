$kind: http-request
url: "{{baseUrl}}/config/api/v1/bookmarks/:bookmarkId"
method: PUT
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: bookmarkId
    value: <string>
    description: (Required) The ID of the bookmark
body:
  type: json
  content: |-
    {
      "title": "<string>",
      "icon": "<string>",
      "visibleToGroups": [
        "<string>",
        "<string>"
      ]
    }
examples: ./.resources/Update a system bookmark.resources/examples
order: 2000
