$kind: http-example
name: Not authenticated.
request:
  url: "{{baseUrl}}/config/api/v1/storages"
  method: GET
  headers:
    Accept: application/json
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "statusCode": "<integer>",
        "message": "<string>",
        "developerMessage": "<string>"
      }
order: 2000
